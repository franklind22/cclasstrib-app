<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cClassTrib por NCM - GitHub Pages</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:Arial,sans-serif;background:#f5f5f5;padding:15px;min-height:100vh;}
.container {background:white;max-width:900px;margin:0 auto;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden;}
.header {background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 20px;text-align:center;}
.header h1 {font-size:24px;margin:0 0 5px;font-weight:700;}
.header p {font-size:14px;opacity:0.9;}
.content {padding:25px;}
.input-group {margin-bottom:18px;}
input {width:100%;padding:16px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px;background:white;transition:all 0.3s;margin-bottom:15px;}
input:focus {border-color:#3b82f6;outline:none;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
.filter-grid {display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}
@media (max-width:700px) {.filter-grid {grid-template-columns:1fr;}}
button {padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;margin:5px 0;}
.btn-search {background:linear-gradient(135deg,#10b981,#059669);color:white;width:100%;grid-column:1/-1;}
.btn-clear {background:#6b7280;color:white;width:100%;grid-column:1/-1;}
.btn-filter {background:#e5e7eb;color:#374151;}
.btn-filter.active {background:#3b82f6;color:white;}
button:active {transform:scale(0.97);}
#resultado {min-height:120px;}
.success {background:#d1fae5;border:2px solid #10b981;border-radius:12px;padding:20px;margin-bottom:15px;}
.error {background:#fee2e2;border:2px solid #ef4444;border-radius:12px;padding:20px;color:#dc2626;}
.loading {text-align:center;padding:25px;color:#3b82f6;}
.table-container {max-height:500px;overflow:auto;border-radius:12px;margin:15px 0;box-shadow:inset 0 2px 10px rgba(0,0,0,0.05);}
table {width:100%;border-collapse:collapse;font-size:14px;}
th {background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;padding:14px 10px;text-align:left;font-weight:600;position:sticky;top:0;z-index:10;}
td {padding:14px 10px;border-bottom:1px solid #e5e7eb;}
tr:hover {background:#f8fafc;}
.pagination {text-align:center;padding:20px;background:#f8fafc;border-radius:12px;}
.page-btn {padding:12px 18px;margin:0 8px;background:#e5e7eb;color:#374151;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
.page-btn.active {background:#3b82f6;color:white;}
.page-btn:hover:not(.active) {background:#d1d5db;}
.history {background:#f1f5f9;border-radius:12px;padding:20px;margin-top:20px;border:1px solid #e2e8f0;display:none;}
.history h3 {color:#1e293b;margin:0 0 15px;font-size:18px;}
.history-item {display:flex;justify-content:space-between;align-items:center;padding:15px;background:white;border-radius:10px;margin-bottom:10px;border:1px solid #e5e7eb;cursor:pointer;transition:background 0.2s;}
.history-item:hover {background:#f8fafc;}
.stats {background:#f0f9ff;border:1px solid #0ea5e9;border-radius:10px;padding:15px;margin-bottom:20px;text-align:center;}
.stats strong {color:#0369a1;font-size:18px;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🧾 cClassTrib por NCM</h1>
<p>Reforma Tributária IBS/CBS 2026 | <strong>GitHub Pages</strong></p>
</div>
<div class="content">
<div class="stats">
<strong id="totalNCMs">25+</strong> NCMs carregados | 
<span id="totalItens">12</span> itens disponíveis
</div>
<div class="input-group">
<input id="ncmInput" type="tel" placeholder="🔍 Digite NCM (96190000)" maxlength="8" autocomplete="off">
</div>
<div class="filter-grid">
<button class="btn-filter active" data-filter="">Todos (12)</button>
<button class="btn-filter" data-filter="reducao">Redução (5)</button>
<button class="btn-filter" data-filter="integral">Integral (7)</button>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
<button id="searchBtn" class="btn-search">🔍 Buscar NCM</button>
<button id="clearBtn" class="btn-clear">🗑️ Limpar Tudo</button>
</div>
<button id="exportBtn" class="btn-import-export" style="width:100%;grid-column:1/-1;margin-top:12px;">📤 Exportar CSV Completo</button>
<div id="resultado"></div>
<div id="historySection" class="history">
<h3>📋 Histórico Recente</h3>
<div id="historyList"></div>
</div>
</div>
</div>

<script>
// DADOS EXPANDIDOS (Gov.br LC 214/2025) - SEM IMPORT
const NCM_DATA = {
'08081000':[{cclasstrib:'100001',cst:'100',descricao:'Frutas frescas',pRed:'0%',regime:'integral'}],
'17011200':[{cclasstrib:'110002',cst:'110',descricao:'Acucar refinado',pRed:'40%',regime:'reducao'}],
'21069090':[{cclasstrib:'110002',cst:'110',descricao:'Alimentos infantis',pRed:'40%',regime:'reducao'}],
'27090000':[{cclasstrib:'500001',cst:'500',descricao:'Combustiveis',pRed:'0%',regime:'integral'}],
'30051010':[{cclasstrib:'300001',cst:'300',descricao:'Adesivos medicos',pRed:'80%',regime:'reducao'}],
'34011190':[{cclasstrib:'100001',cst:'100',descricao:'Sabo em barra',pRed:'0%',regime:'integral'}],
'84713000':[{cclasstrib:'600002',cst:'600',descricao:'Notebooks',pRed:'30%',regime:'reducao'}],
'87120000':[{cclasstrib:'400015',cst:'400',descricao:'Bicicletas',pRed:'25%',regime:'reducao'}],
'90189090':[{cclasstrib:'700003',cst:'700',descricao:'Instrumentos medicos',pRed:'50%',regime:'reducao'}],
'96190000':[
{cclasstrib:'200013',cst:'200',descricao:'Absorventes higienicos',pRed:'100%',regime:'reducao'},
{cclasstrib:'200035',cst:'200',descricao:'Fraldas descartaveis',pRed:'60%',regime:'reducao'}
]
};

// Estatísticas
const TOTAL_NCMS = Object.keys(NCM_DATA).length;
const ALL_ITEMS = Object.values(NCM_DATA).reduce((a,b)=>a+b.length,0);
const REDUCAO_ITEMS = Object.values(NCM_DATA).reduce((sum,items)=>sum+items.filter(i=>i.regime==='reducao').length,0);
const INTEGRAL_ITEMS = Object.values(NCM_DATA).reduce((sum,items)=>sum+items.filter(i=>i.regime==='integral').length,0);

document.getElementById('totalNCMs').textContent = TOTAL_NCMS + '+';
document.getElementById('totalItens').textContent = ALL_ITEMS;

// Árvore otimizada
const NCM_TREE = {};
Object.keys(NCM_DATA).forEach(ncm => {
const prefix = ncm.slice(0,4);
if (!NCM_TREE[prefix]) NCM_TREE[prefix] = [];
NCM_TREE[prefix].push(ncm);
});

let currentResults = [];
let currentPage = 0;
const ITEMS_PER_PAGE = 20;
let currentFilter = '';

function updateFilterButtons() {
document.querySelectorAll('.btn-filter').forEach(btn => {
btn.classList.toggle('active', btn.dataset.filter === currentFilter);
});
}

function filterGlobal(filter = '') {
currentFilter = filter;
const resultDiv = document.getElementById('resultado');
resultDiv.innerHTML = '<div class="loading">🔍 Filtrando ' + (filter ? filter : 'todos') + '...</div>';

setTimeout(() => {
let matches = [];
Object.entries(NCM_DATA).forEach(([ncmKey, items]) => {
items.forEach(item => {
if (!filter || item.regime === filter || item.descricao.toLowerCase().includes(filter)) {
matches.push({...item, ncm: ncmKey});
}
});
});

currentResults = matches;
currentPage = 0;
showPage();
updateStats();
}, 100);
}

function searchNCM() {
const ncm = document.getElementById('ncmInput').value.replace(/D/g,'');
if (ncm.length < 2) {
document.getElementById('resultado').innerHTML = '<div class="error">❌ Digite pelo menos 2 dígitos do NCM</div>';
return;
}

const resultDiv = document.getElementById('resultado');
resultDiv.innerHTML = '<div class="loading">🔍 Buscando NCM ' + ncm + '...</div>';

setTimeout(() => {
const prefix = ncm.slice(0,4);
const candidates = NCM_TREE[prefix] || [];
const matches = [];

candidates.filter(key => key.includes(ncm)).forEach(key => {
NCM_DATA[key].forEach(item => {
if (!currentFilter || item.regime === currentFilter) {
matches.push({...item, ncm: key});
}
});
});

currentResults = matches;
currentPage = 0;
showPage();
addToHistory(ncm);
}, 50);
}

function showPage() {
const total = currentResults.length;
if (total === 0) {
document.getElementById('resultado').innerHTML = '<div class="error">❌ Nenhum resultado encontrado</div>';
return;
}

const start = currentPage * ITEMS_PER_PAGE;
const end = start + ITEMS_PER_PAGE;
const pageData = currentResults.slice(start, end);

let html = `<div class="success">✅ ${total} resultado(s) | Página ${currentPage+1} de ${Math.ceil(total/ITEMS_PER_PAGE)}</div>`;
html += '<div class="table-container">';
html += '<table><tr><th>NCM</th><th>cClassTrib</th><th>CST</th><th>Descrição</th><th>%Red.</th><th>Regime</th></tr>';

pageData.forEach(item => {
html += `<tr><td>${item.ncm}</td><td><strong>${item.cclasstrib}</strong></td><td>${item.cst}</td><td>${item.descricao}</td><td>${item.pRed}</td><td>${item.regime}</td></tr>`;
});

html += '</table></div>';
html += '<div class="pagination">';
if (currentPage > 0) html += `<button class="page-btn" onclick="previousPage()">← Anterior</button>`;
html += `<span class="page-btn active">${currentPage+1}</span>`;
if (end < total) html += `<button class="page-btn" onclick="nextPage()">Próxima →</button>`;
html += '</div>';

document.getElementById('resultado').innerHTML = html;
}

function previousPage() { if (currentPage > 0) { currentPage--; showPage(); } }
function nextPage() { if ((currentPage + 1) * ITEMS_PER_PAGE < currentResults.length) { currentPage++; showPage(); } }

function updateStats() {
document.querySelectorAll('.btn-filter').forEach(btn => {
const filter = btn.dataset.filter;
let count = 0;
Object.values(NCM_DATA).forEach(items => {
items.forEach(item => {
if (!filter || item.regime === filter || item.descricao.toLowerCase().includes(filter)) count++;
});
});
btn.textContent = (filter || 'Todos') + ' (' + count + ')';
});
}

function addToHistory(ncm) {
let history = JSON.parse(localStorage.getItem('cclasstribHistory')) || [];
if (!history.find(h => h.ncm === ncm)) {
history.unshift({ncm, date: new Date().toLocaleString('pt-BR')});
localStorage.setItem('cclasstribHistory', JSON.stringify(history.slice(0,10)));
showHistory();
}
}

function showHistory() {
const history = JSON.parse(localStorage.getItem('cclasstribHistory')) || [];
const list = document.getElementById('historyList');
const section = document.getElementById('historySection');

if (history.length > 0) {
list.innerHTML = history.slice(0,5).map(h => 
`<div class="history-item" onclick="document.getElementById('ncmInput').value='${h.ncm}';searchNCM()">
<span>${h.ncm} <small style="opacity:0.7;">(${h.date})</small></span>
</div>`
).join('');
section.style.display = 'block';
} else {
section.style.display = 'none';
}
}

function clearAll() {
document.getElementById('ncmInput').value = '';
currentFilter = '';
currentResults = [];
currentPage = 0;
document.getElementById('resultado').innerHTML = '';
localStorage.removeItem('cclasstribHistory');
showHistory();
updateFilterButtons();
}

function exportCSV() {
let csv = 'NCM,cClassTrib,CST,Descrição,%Redução,Regime
';
Object.entries(NCM_DATA).forEach(([ncm, items]) => {
items.forEach(item => {
csv += `"${ncm}","${item.cclasstrib}","${item.cst}","${item.descricao}","${item.pRed}","${item.regime}"
`;
});
});
const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `cclasstrib-${new Date().toISOString().slice(0,10)}.csv`;
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

// EVENTOS
document.addEventListener('DOMContentLoaded', () => {
document.getElementById('searchBtn').onclick = searchNCM;
document.getElementById('clearBtn').onclick = clearAll;
document.getElementById('exportBtn').onclick = exportCSV;
document.getElementById('ncmInput').onkeypress = e => e.key === 'Enter' && searchNCM();
document.querySelectorAll('.btn-filter').forEach(btn => {
btn.onclick = () => {
currentFilter = btn.dataset.filter;
updateFilterButtons();
filterGlobal(currentFilter);
};
});
updateFilterButtons();
updateStats();
showHistory();
filterGlobal(''); // Carrega todos inicialmente
});
</script>
</body>
</html>
