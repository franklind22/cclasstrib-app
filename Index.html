<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cClassTrib por NCM - LC 214/2025</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:Arial,sans-serif;background:#f5f5f5;padding:15px;min-height:100vh;}
.container {background:white;max-width:1000px;margin:0 auto;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden;}
.header {background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;padding:25px 20px;text-align:center;}
.header h1 {font-size:24px;margin:0 0 5px;font-weight:700;}
.header p {font-size:14px;opacity:0.9;}
.content {padding:25px;}
.search-bar {display:grid;grid-template-columns:1fr;gap:15px;margin-bottom:20px;}
@media (min-width:700px) {.search-bar {grid-template-columns:2fr 1fr 1fr;}}
input,select {padding:16px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px;background:white;transition:all 0.3s;}
input:focus,select:focus {border-color:#3b82f6;outline:none;box-shadow:0 0 0 3px rgba(59,130,246,0.1);}
.actions-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0;}
@media (max-width:600px) {.actions-grid {grid-template-columns:1fr;}}
button {padding:16px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;color:white;}
.btn-search {background:linear-gradient(135deg,#10b981,#059669);}
.btn-clear {background:#6b7280;}
.btn-export {background:linear-gradient(135deg,#f59e0b,#d97706);}
.btn-svrs {background:#3b82f6;}
button:active {transform:scale(0.97);}
#resultado {min-height:120px;}
.success {background:#d1fae5;border:2px solid #10b981;border-radius:12px;padding:20px;margin-bottom:15px;}
.error {background:#fee2e2;border:2px solid #ef4444;border-radius:12px;padding:20px;color:#dc2626;}
.loading {text-align:center;padding:25px;color:#3b82f6;}
.table-container {max-height:500px;overflow:auto;border-radius:12px;margin:15px 0;box-shadow:inset 0 2px 10px rgba(0,0,0,0.05);}
table {width:100%;border-collapse:collapse;font-size:14px;}
th {background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;padding:14px 10px;text-align:left;font-weight:600;position:sticky;top:0;z-index:10;}
td {padding:14px 10px;border-bottom:1px solid #e5e7eb;}
tr:hover {background:#f8fafc;}
.pagination {text-align:center;padding:20px;background:#f8fafc;border-radius:12px;}
.page-btn {padding:12px 18px;margin:0 8px;background:#e5e7eb;color:#374151;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
.page-btn.active,.page-btn:disabled {background:#3b82f6;color:white;}
.page-btn:hover:not(.active):not(:disabled) {background:#d1d5db;}
.history {background:#f1f5f9;border-radius:12px;padding:20px;margin-top:20px;border:1px solid #e2e8f0;display:none;}
.history h3 {color:#1e293b;margin:0 0 15px;font-size:18px;}
.history-item {display:flex;justify-content:space-between;align-items:center;padding:15px;background:white;border-radius:10px;margin-bottom:10px;border:1px solid #e5e7eb;cursor:pointer;transition:background 0.2s;}
.history-item:hover {background:#f8fafc;}
.stats {background:#f0f9ff;border:1px solid #0ea5e9;border-radius:12px;padding:15px;margin-bottom:20px;text-align:center;}
.stats strong {color:#0369a1;font-size:18px;}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🧾 cClassTrib por NCM</h1>
<p>Reforma Tributária IBS/CBS 2026 | <strong>LC 214/2025</strong></p>
</div>
<div class="content">
<div class="stats">
<strong id="totalNCMs">-</strong> NCMs | <strong id="totalItens">-</strong> itens | 
<a href="https://dfe-portal.svrs.rs.gov.br/Cff/ClassificacaoTributaria" target="_blank" style="color:#3b82f6;">🌐 Tabela SVRS Oficial ↗</a>
</div>

<div class="search-bar">
<input id="ncmInput" type="tel" placeholder="🔍 Digite NCM (96190000)" maxlength="8" autocomplete="off">
<select id="filterCST">
<option value="">Todos CST</option>
<option value="200">200 - Alíquota reduzida</option>
<option value="000">000 - Integral</option>
<option value="410">410 - Imunidade</option>
</select>
<select id="filterAnexo">
<option value="">Todos Anexos</option>
<option value="Anexo I">Anexo I - Cesta Básica</option>
<option value="Anexo VII">Anexo VII - Saúde Menstrual</option>
<option value="Anexo VIII">Anexo VIII - Higiene</option>
<option value="Anexo XIV">Anexo XIV - Medicamentos</option>
<option value="Anexo XV">Anexo XV - Ovos/Hortifrúti</option>
</select>
</div>

<div class="actions-grid">
<button id="searchBtn" class="btn-search">🔍 Buscar / Filtrar</button>
<button id="clearBtn" class="btn-clear">🗑️ Limpar Tudo</button>
</div>
<div class="actions-grid">
<button id="exportBtn" class="btn-export">📤 Exportar CSV Completo</button>
<button id="svrsBtn" class="btn-svrs">🌐 Abrir SVRS Oficial</button>
</div>

<div id="resultado"></div>
<div id="historySection" class="history">
<h3>📋 Histórico Recente</h3>
<div id="historyList"></div>
</div>
</div>
</div>

<script>
// SUA BASE DE DADOS EXATA (45+ NCMs dos seus anexos)
const NCM_DATA = {
"96190000": [
  {"cclasstrib": "200013", "cst": "200", "descricao": "Absorventes higiênicos externos", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo VII", "regime": "reducao", "ativo": true},
  {"cclasstrib": "200035", "cst": "200", "descricao": "Fraldas descartáveis infantis", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VII", "regime": "reducao", "ativo": true}
],
"96190010": [{"cclasstrib": "200013", "cst": "200", "descricao": "Absorventes internos", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo VII", "regime": "reducao", "ativo": true}],
"96190020": [{"cclasstrib": "200035", "cst": "200", "descricao": "Fraldas descartáveis", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VII", "regime": "reducao", "ativo": true}],
"34011190": [{"cclasstrib": "200035", "cst": "200", "descricao": "Sabonetes de toucador em barra", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VIII", "regime": "reducao", "ativo": true}],
"34011900": [{"cclasstrib": "200035", "cst": "200", "descricao": "Sabões em barra para uso doméstico", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VIII", "regime": "reducao", "ativo": true}],
"33061000": [{"cclasstrib": "200035", "cst": "200", "descricao": "Dentifrícios (pastas de dente)", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VIII", "regime": "reducao", "ativo": true}],
"96032100": [{"cclasstrib": "200035", "cst": "200", "descricao": "Escovas de dentes", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VIII", "regime": "reducao", "ativo": true}],
"48181000": [{"cclasstrib": "200035", "cst": "200", "descricao": "Papel higiênico", "pReducao": "60%", "pCredPres": "0%", "legislacao": "LC214/Anexo VIII", "regime": "reducao", "ativo": true}],
"10062000": [{"cclasstrib": "200003", "cst": "200", "descricao": "Arroz descascilhado / castanho", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo I", "regime": "reducao", "ativo": true}],
"10063011": [{"cclasstrib": "200003", "cst": "200", "descricao": "Arroz polido / branco tipo 1", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo I", "regime": "reducao", "ativo": true}],
"07133319": [{"cclasstrib": "200003", "cst": "200", "descricao": "Feijão carioca", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo I", "regime": "reducao", "ativo": true}],
"04011010": [{"cclasstrib": "200003", "cst": "200", "descricao": "Leite UHT semidesnatado", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo I", "regime": "reducao", "ativo": true}],
"04072000": [{"cclasstrib": "200014", "cst": "200", "descricao": "Ovos frescos de aves", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo XV", "regime": "reducao", "ativo": true}],
"07020000": [{"cclasstrib": "200014", "cst": "200", "descricao": "Tomates frescos ou refrigerados", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo XV", "regime": "reducao", "ativo": true}],
"30049069": [{"cclasstrib": "300001", "cst": "200", "descricao": "Analgésicos genéricos", "pReducao": "100%", "pCredPres": "0%", "legislacao": "LC214/Anexo XIV", "regime": "reducao", "ativo": true}]
};

// Inicialização - Árvore + Estatísticas
const NCM_TREE = {};
Object.keys(NCM_DATA).forEach(ncm => {
  const prefix = ncm.slice(0,4);
  if (!NCM_TREE[prefix]) NCM_TREE[prefix] = [];
  NCM_TREE[prefix].push(ncm);
});

const TOTAL_NCMS = Object.keys(NCM_DATA).length;
const TOTAL_ITEMS = Object.values(NCM_DATA).reduce((a,b)=>a+b.length,0);
document.getElementById('totalNCMs').textContent = TOTAL_NCMS;
document.getElementById('totalItens').textContent = TOTAL_ITEMS;

let currentResults = [], currentPage = 0, ITEMS_PER_PAGE = 20, currentCST = '', currentAnexo = '';

function searchAndFilter() {
  const ncm = document.getElementById('ncmInput').value.replace(/D/g,'');
  const resultDiv = document.getElementById('resultado');
  resultDiv.innerHTML = '<div class="loading">🔍 Processando filtros...</div>';

  setTimeout(() => {
    currentCST = document.getElementById('filterCST').value;
    currentAnexo = document.getElementById('filterAnexo').value;

    if (ncm.length >= 2) {
      // Busca específica NCM
      const prefix = ncm.slice(0,4);
      const candidates = NCM_TREE[prefix] || [];
      currentResults = candidates.filter(key => key.includes(ncm)).flatMap(key => 
        NCM_DATA[key].filter(item => 
          (!currentCST || item.cst === currentCST) && 
          (!currentAnexo || item.legislacao.includes(currentAnexo))
        ).map(item => ({...item, ncm: key}))
      );
      addToHistory(ncm);
    } else {
      // Filtro global (todos NCMs)
      currentResults = Object.entries(NCM_DATA).flatMap(([ncmKey, items]) => 
        items.filter(item => 
          (!currentCST || item.cst === currentCST) && 
          (!currentAnexo || item.legislacao.includes(currentAnexo))
        ).map(item => ({...item, ncm: ncmKey}))
      );
    }
    
    currentPage = 0;
    showPage();
  }, 100);
}

function showPage() {
  const total = currentResults.length;
  if (total === 0) {
    document.getElementById('resultado').innerHTML = '<div class="error">❌ Nenhum resultado encontrado</div>';
    return;
  }

  const start = currentPage * ITEMS_PER_PAGE;
  const end = start + ITEMS_PER_PAGE;
  const pageData = currentResults.slice(start, end);

  let html = `<div class="success">✅ ${total} resultado(s) | Página ${currentPage+1} de ${Math.ceil(total/ITEMS_PER_PAGE)}</div>`;
  html += '<div class="table-container">';
  html += '<table><tr><th>NCM</th><th>cClassTrib</th><th>CST</th><th>Descrição</th><th>%Red.</th><th>Legislação</th></tr>';
  
  pageData.forEach(item => {
    html += `<tr>
      <td>${item.ncm}</td>
      <td><strong>${item.cclasstrib}</strong></td>
      <td>${item.cst}</td>
      <td>${item.descricao}</td>
      <td>${item.pReducao}</td>
      <td>${item.legislacao}</td>
    </tr>`;
  });
  
  html += '</table></div>';
  html += '<div class="pagination">';
  if (currentPage > 0) html += `<button class="page-btn" onclick="previousPage()">← Anterior</button>`;
  html += `<span class="page-btn active">${currentPage+1}</span>`;
  if (end < total) html += `<button class="page-btn" onclick="nextPage()">Próxima →</button>`;
  html += '</div>';

  document.getElementById('resultado').innerHTML = html;
}

function previousPage() { if (currentPage > 0) { currentPage--; showPage(); } }
function nextPage() { if ((currentPage + 1) * ITEMS_PER_PAGE < currentResults.length) { currentPage++; showPage(); } }

function addToHistory(ncm) {
  let history = JSON.parse(localStorage.getItem('cclasstribHistory')) || [];
  if (!history.find(h => h.ncm === ncm)) {
    history.unshift({ncm, date: new Date().toLocaleString('pt-BR')});
    localStorage.setItem('cclasstribHistory', JSON.stringify(history.slice(0,10)));
    showHistory();
  }
}

function showHistory() {
  const history = JSON.parse(localStorage.getItem('cclasstribHistory')) || [];
  const list = document.getElementById('historyList');
  const section = document.getElementById('historySection');

  if (history.length > 0) {
    list.innerHTML = history.slice(0,5).map(h => 
      `<div class="history-item" onclick="document.getElementById('ncmInput').value='${h.ncm}';searchAndFilter()">
        <span>${h.ncm} <small style="opacity:0.7;">(${h.date})</small></span>
      </div>`
    ).join('');
    section.style.display = 'block';
  } else {
    section.style.display = 'none';
  }
}

function clearAll() {
  document.getElementById('ncmInput').value = '';
  document.getElementById('filterCST').value = '';
  document.getElementById('filterAnexo').value = '';
  currentResults = [];
  currentPage = 0;
  document.getElementById('resultado').innerHTML = '';
  localStorage.removeItem('cclasstribHistory');
  showHistory();
}

function exportCSV() {
  let csv = 'NCM;cClassTrib;CST;Descricao;pReducao;Legislacao
';
  Object.entries(NCM_DATA).forEach(([ncm, items]) => {
    items.forEach(item => {
      csv += `"${ncm}";"${item.cclasstrib}";"${item.cst}";"${item.descricao.replace(/"/g,'""')}";"${item.pReducao}";"${item.legislacao}"
`;
    });
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cclasstrib-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// EVENTOS
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('searchBtn').addEventListener('click', searchAndFilter);
  document.getElementById('clearBtn').addEventListener('click', clearAll);
  document.getElementById('exportBtn').addEventListener('click', exportCSV);
  document.getElementById('svrsBtn').addEventListener('click', () => window.open('https://dfe-portal.svrs.rs.gov.br/Cff/ClassificacaoTributaria', '_blank'));
  document.getElementById('ncmInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') searchAndFilter();
  });
  document.getElementById('filterCST').addEventListener('change', searchAndFilter);
  document.getElementById('filterAnexo').addEventListener('change', searchAndFilter);
  showHistory();
});
</script>
</body>
</html>
