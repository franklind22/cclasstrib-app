<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>cClassTrib por NCM - LC 214/2025</title>
    <style>
        :root { --primary: #1e3a8a; --success: #059669; --bg: #f8fafc; }
        * {margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); padding: 10px; color: #1e293b; }
        .container { background: white; max-width: 1200px; margin: 0 auto; border-radius: 16px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); overflow: hidden; }
        .header { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; padding: 25px 15px; text-align: center; }
        .header h1 { font-size: clamp(1.4rem, 5vw, 1.8rem); margin-bottom: 5px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }
        .content { padding: 15px; }
        .stats { background: #f1f5f9; border-radius: 12px; padding: 12px; margin-bottom: 20px; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; font-size: 13px; border: 1px solid #e2e8f0; }
        .search-bar { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 15px; }
        @media (min-width: 768px) { .search-bar { grid-template-columns: 2fr 1fr 1fr; } }
        input, select { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; background: white; }
        .actions-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        @media (min-width: 480px) { .actions-grid { grid-template-columns: 1fr 1fr; } }
        button { padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-search { background: #2563eb; }
        .btn-clear { background: #64748b; }
        .btn-export { background: var(--success); }
        .btn-link { background: #ffffff; color: #475569; border: 1px solid #e2e8f0; }
        .table-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { background: #f8fafc; padding: 15px 10px; text-align: left; font-size: 12px; color: #64748b; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .cclasstrib-cell { color: var(--success); font-weight: bold; font-family: monospace; font-size: 16px; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error { background: #fef2f2; color: #b91c1c; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #fee2e2; }
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn { padding: 10px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: #2563eb; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧾 cClassTrib por NCM</h1>
        <p>Reforma Tributária 2026 | LC 214/2025</p>
    </div>

    <div class="content">
        <div class="stats">
            <span>Base: <strong id="totalNCMs">0</strong> NCMs</span>
            <span>Regras: <strong id="totalItens">0</strong></span>
        </div>

        <div class="search-bar">
            <input id="ncmInput" type="tel" placeholder="🔍 Digite NCM (ex: 02013000)" maxlength="8">
            <select id="filterCST">
                <option value="">Todos CSTs</option>
                <option value="000">000 - Integral</option>
                <option value="200">200 - Reduzida</option>
                <option value="410">410 - Imunidade</option>
            </select>
            <select id="filterAnexo">
                <option value="">Todos os Anexos / Regimes</option>
                <option value="Anexo I">Anexo I - Cesta Básica</option>
                <option value="Anexo VII">Anexo VII - Saúde Menstrual</option>
                <option value="Anexo VIII">Anexo VIII - Higiene Pessoal</option>
                <option value="Anexo IX">Anexo IX - Insumos Agropecuários</option>
                <option value="Anexo XV">Anexo XV - Hortifrúti e Ovos</option>
                <option value="Geral">Regime Geral (Roupas / Jeans / TVs)</option>
                <option value="Específico">Regime Específico (Restaurantes / Bares)</option>
                <option value="Seletivo">Imposto Seletivo (Bebidas / Cigarros)</option>
            </select>
        </div>

        <div class="actions-grid">
            <button onclick="searchAndFilter()" class="btn-search">🔍 Buscar / Filtrar</button>
            <button onclick="clearAll()" class="btn-clear">🗑️ Limpar</button>
        </div>

        <div class="actions-grid">
            <button onclick="exportCSV()" class="btn-export">📤 Exportar CSV</button>
            <button onclick="window.open('https://dfe-portal.svrs.rs.gov.br/Cff/ClassificacaoTributaria', '_blank')" class="btn-link">🌐 SVRS Oficial</button>
        </div>

        <div id="resultado"></div>
    </div>
</div>
<script>
let NCM_DATA = {};
let NCM_TREE = {};
let currentResults = [];
let currentPage = 0;
const ITEMS_PER_PAGE = 15;

/* =========================
   INICIALIZAÇÃO
========================= */
document.addEventListener("DOMContentLoaded", loadExternalData);

/* =========================
   CARREGAR JSON
========================= */
async function loadExternalData() {
    const resultDiv = document.getElementById('resultado');
    resultDiv.innerHTML = '<div class="loading">📥 Carregando dados...</div>';

    try {
        const response = await fetch(`/cclasstrib-app/dados.json?t=${Date.now()}`);
        if (!response.ok) throw new Error();

        NCM_DATA = await response.json();

        buildTree();
        updateCounters();

        resultDiv.innerHTML = '';
        console.log("✅ Dados carregados:", Object.keys(NCM_DATA).length);
        console.log("Tentando carregar JSON...");
    } catch (e) {
        console.error(e);
        resultDiv.innerHTML = `
            <div class="error">
                <strong>⚠️ Erro ao carregar dados</strong>
            </div>`;
    }
}

/* =========================
   ORGANIZA ÁRVORE NCM
========================= */
function buildTree() {
    NCM_TREE = {};

    Object.keys(NCM_DATA).forEach(ncm => {
        const prefix = ncm.slice(0,4);
        if (!NCM_TREE[prefix]) NCM_TREE[prefix] = [];
        NCM_TREE[prefix].push(ncm);
    });
}

/* =========================
   ATUALIZA CONTADORES
========================= */
function updateCounters() {
    document.getElementById('totalNCMs').textContent =
        Object.keys(NCM_DATA).length;

    document.getElementById('totalItens').textContent =
        Object.values(NCM_DATA)
            .reduce((total, arr) => total + arr.length, 0);
}

/* =========================
   BUSCA + FILTRO
========================= */
function searchAndFilter() {

    const ncmQuery = document.getElementById('ncmInput').value.replace(/\D/g,'');
    const fCST = document.getElementById('filterCST').value;
    const fAnexo = document.getElementById('filterAnexo').value;

    let pool = [];

    if (ncmQuery.length >= 2) {
        const prefix = ncmQuery.slice(0,4);
        const matches = (NCM_TREE[prefix] || [])
            .filter(code => code.includes(ncmQuery));

        matches.forEach(code => {
            NCM_DATA[code].forEach(item => {
                pool.push({...item, ncm: code});
            });
        });
    } else {
        Object.entries(NCM_DATA).forEach(([code, items]) => {
            items.forEach(item => pool.push({...item, ncm: code}));
        });
    }

    currentResults = pool.filter(item => {
        const matchCST = !fCST || item.cst === fCST;
        const matchAnexo = !fAnexo ||
            (item.legislacao &&
             item.legislacao.toUpperCase().includes(fAnexo.toUpperCase()));

        return matchCST && matchAnexo;
    });

    currentPage = 0;
    renderTable();
}

/* =========================
   RENDERIZA TABELA
========================= */
function renderTable() {

    const resultDiv = document.getElementById("resultado");

    if (currentResults.length === 0) {
        resultDiv.innerHTML =
            "<div class='error'>Nenhum resultado encontrado.</div>";
        return;
    }

    const start = currentPage * ITEMS_PER_PAGE;
    const end = start + ITEMS_PER_PAGE;
    const pageItems = currentResults.slice(start, end);

    resultDiv.innerHTML = `
        <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>NCM</th>
                    <th>cClassTrib</th>
                    <th>CST</th>
                    <th>Descrição</th>
                    <th>Redução</th>
                    <th>Legislação</th>
                </tr>
            </thead>
            <tbody>
                ${pageItems.map(item => `
                    <tr>
                        <td>${item.ncm}</td>
                        <td class="cclasstrib-cell">${item.cclasstrib}</td>
                        <td>${item.cst}</td>
                        <td>${item.descricao}</td>
                        <td>${item.pReducao}</td>
                        <td>${item.legislacao}</td>
                    </tr>
                `).join("")}
            </tbody>
        </table>
        </div>
    `;
}

/* =========================
   LIMPAR
========================= */
function clearAll() {
    document.getElementById('ncmInput').value = "";
    document.getElementById('filterCST').value = "";
    document.getElementById('filterAnexo').value = "";
    document.getElementById('resultado').innerHTML = "";
    currentResults = [];
}
</script>
</body>
</html>
