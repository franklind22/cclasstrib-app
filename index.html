<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>cClassTrib por NCM - LC 214/2025</title>

<style>
:root{
--primary:#1e3a8a;
--primary-light:#3b82f6;
--success:#059669;
--danger:#b91c1c;
--bg:#f8fafc;
--border:#e2e8f0;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui;background:var(--bg);padding:15px;color:#1e293b;}
.container{background:#fff;max-width:1500px;margin:auto;border-radius:16px;box-shadow:0 4px 25px rgba(0,0,0,.06);overflow:hidden;}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:25px;text-align:center;}
.content{padding:25px;}

.stats{display:flex;flex-wrap:wrap;gap:15px;justify-content:space-between;align-items:center;background:#f1f5f9;padding:15px 20px;border-radius:12px;border:1px solid var(--border);margin-bottom:20px;font-size:14px;}

.search-bar{display:grid;gap:12px;margin-bottom:15px;}
@media(min-width:900px){.search-bar{grid-template-columns:2fr 1fr 1fr 1fr 1fr 1fr;}}

input,select{padding:10px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:#fff;}
input:focus,select:focus{border-color:var(--primary-light);outline:none;}

.actions{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:20px;}
button{padding:10px;border:none;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px;}
.btn-search{background:#2563eb;color:#fff;}
.btn-clear{background:#64748b;color:#fff;}
.btn-export{background:var(--success);color:#fff;}
.btn-update{background:#f59e0b;color:#fff;}

.chapter-summary{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:15px;}
.chapter-summary h3{margin-bottom:10px;font-size:15px;}
.chapter-list{display:flex;flex-wrap:wrap;gap:8px;}
.chapter-item{background:#e2e8f0;padding:6px 10px;border-radius:8px;font-size:12px;cursor:pointer;}
.chapter-item:hover{background:#3b82f6;color:#fff;}

.table-container{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;min-width:1100px;}
th{background:#f8fafc;padding:10px;font-size:12px;text-transform:uppercase;border-bottom:2px solid var(--border);cursor:pointer;}
td{padding:10px;border-bottom:1px solid #f1f5f9;font-size:13px;}
.cclasstrib-cell{color:var(--success);font-weight:bold;font-family:monospace;}

.badge{padding:3px 7px;border-radius:8px;font-size:11px;font-weight:600;color:#fff;}
.reducao{background:#059669;}
.diferimento{background:#2563eb;}
.exportacao{background:#7c3aed;}
.suspensao{background:#ea580c;}
.monofasico{background:#0d9488;}
.outro{background:#475569;}

.pagination{display:flex;justify-content:center;gap:6px;margin-top:15px;flex-wrap:wrap;}
.page-btn{padding:5px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;}
.page-btn.active{background:#2563eb;color:#fff;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999;}
.modal{background:#fff;width:90%;max-width:500px;padding:20px;border-radius:16px;}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h2>cClassTrib por NCM</h2>
<p>Reforma Tributária 2026</p>
</div>

<div class="content">

<div class="stats">
<button class="btn-update" onclick="location.reload()">Atualizar</button>
<span>NCMs: <strong id="totalNCMs">0</strong></span>
<span>Regras: <strong id="totalItens">0</strong></span>
<span>Resultados: <strong id="totalResultados">0</strong></span>
</div>

<div class="search-bar">
<input id="ncmInput" placeholder="Buscar NCM ou descrição...">
<select id="filterCapitulo" onchange="gerarResumoCapitulo()"></select>
<select id="filterCST"><option value="">CST</option><option>200</option><option>300</option><option>400</option><option>410</option><option>450</option></select>
<select id="filterAnexo"><option value="">Anexo</option><option>I</option><option>VII</option><option>VIII</option><option>IX</option><option>XV</option></select>
<select id="filterReducao"><option value="">Redução</option><option value="com">Com</option><option value="sem">Sem</option></select>
<button class="btn-search" onclick="searchAndFilter()">Buscar</button>
</div>

<div class="actions">
<button class="btn-clear" onclick="clearAll()">Limpar</button>
<button class="btn-export" onclick="exportCSV()">Exportar CSV</button>
</div>

<div id="chapterSummary"></div>
<div id="resultado"></div>
<div id="pagination" class="pagination"></div>

</div>
</div>

<div id="termoModal" class="modal-overlay" style="display:none;">
<div class="modal">
<h3>⚠ TERMO DE USO</h3>
<p>Ferramenta de simulação pedagógica. Validar com profissional contábil antes de uso fiscal.</p>
<label><input type="checkbox" id="aceiteTermo"> Concordo</label><br><br>
<button onclick="aceitarTermo()">Aceitar</button>
</div>
</div>

<script>
const SISTEMA_VERSAO="3.6.0";
const ITEMS_PER_PAGE=20;

const CAPITULOS_OFICIAIS={
"01":"Animais vivos","02":"Carnes e miudezas, comestíveis","03":"Peixes e crustáceos",
"04":"Leite e laticínios","05":"Outros produtos de origem animal",
"06":"Plantas vivas","07":"Produtos hortícolas","08":"Frutas",
"09":"Café, chá e especiarias","10":"Cereais","11":"Produtos da moagem",
"12":"Sementes e frutos oleaginosos","13":"Gomas e resinas","14":"Matérias para entrançar",
"15":"Gorduras e óleos","16":"Preparações de carne","17":"Açúcares",
"18":"Cacau","19":"Preparações à base de cereais","20":"Preparações de produtos hortícolas",
"21":"Preparações alimentícias diversas","22":"Bebidas","23":"Resíduos alimentares",
"24":"Tabaco","25":"Sal, enxofre, terras","26":"Minérios",
"27":"Combustíveis minerais","28":"Produtos químicos inorgânicos",
"29":"Produtos químicos orgânicos","30":"Produtos farmacêuticos",
"31":"Adubos","32":"Extratos tanantes","33":"Óleos essenciais",
"34":"Sabões e detergentes","35":"Matérias albuminoides","36":"Explosivos",
"37":"Produtos fotográficos","38":"Produtos diversos da indústria química",
"39":"Plásticos","40":"Borracha","41":"Peles","42":"Obras de couro",
"43":"Peles com pelo","44":"Madeira","45":"Cortiça","46":"Obras de espartaria",
"47":"Pastas de madeira","48":"Papel e cartão","49":"Produtos editoriais",
"50":"Seda","51":"Lã","52":"Algodão","53":"Outras fibras vegetais",
"54":"Filamentos sintéticos","55":"Fibras sintéticas","56":"Pastas têxteis",
"57":"Tapetes","58":"Tecidos especiais","59":"Tecidos impregnados",
"60":"Tecidos de malha","61":"Vestuário de malha","62":"Vestuário",
"63":"Outros artefatos têxteis","64":"Calçados","65":"Chapéus",
"66":"Guarda-chuvas","67":"Penas e flores artificiais",
"68":"Obras de pedra","69":"Produtos cerâmicos",
"70":"Vidro","71":"Pérolas e metais preciosos",
"72":"Ferro fundido","73":"Obras de ferro",
"74":"Cobre","75":"Níquel","76":"Alumínio","78":"Chumbo",
"79":"Zinco","80":"Estanho","81":"Outros metais",
"82":"Ferramentas","83":"Obras diversas de metais",
"84":"Máquinas","85":"Material elétrico",
"86":"Material ferroviário","87":"Veículos automóveis",
"88":"Aeronaves","89":"Embarcações",
"90":"Instrumentos ópticos","91":"Relógios",
"92":"Instrumentos musicais","93":"Armas",
"94":"Móveis","95":"Brinquedos",
"96":"Obras diversas","97":"Objetos de arte",
"98":"Operações especiais","99":"Operações especiais"
};

let RAW_DATA={},FLAT_INDEX=[],currentResults=[],currentPage=0;

async function loadData(){
const res=await fetch('/cclasstrib-app/dados.json?v='+Date.now());
RAW_DATA=await res.json();
buildFlat();
buildCapitulos();
clearAll();
}

function buildFlat(){
FLAT_INDEX=[];
Object.entries(RAW_DATA).forEach(([ncm,items])=>{
items.forEach(i=>{
FLAT_INDEX.push({
ncm,
cclasstrib:i.cclasstrib||"",
cst:i.cst||"",
anexo:i.anexo||"",
descricao:i.descricao_anexo||"",
regra:(i.regra||"").toLowerCase(),
fundamento:i.fundamento||""
});
});
});
document.getElementById("totalNCMs").textContent=Object.keys(RAW_DATA).length;
document.getElementById("totalItens").textContent=FLAT_INDEX.length;
}

function buildCapitulos(){
let select=document.getElementById("filterCapitulo");
select.innerHTML='<option value="">Capítulo</option>';
Object.keys(CAPITULOS_OFICIAIS).sort().forEach(cap=>{
let count=FLAT_INDEX.filter(i=>i.ncm.startsWith(cap)).length;
let opt=document.createElement("option");
opt.value=cap;
opt.textContent=`${cap} - ${CAPITULOS_OFICIAIS[cap]} (${count})`;
select.appendChild(opt);
});
}

function gerarResumoCapitulo(){
let cap=document.getElementById("filterCapitulo").value;
let div=document.getElementById("chapterSummary");
div.innerHTML="";
if(!cap) return;
let grupo={};
FLAT_INDEX.forEach(i=>{
if(i.ncm.startsWith(cap)){
let pos=i.ncm.substring(0,4);
grupo[pos]=(grupo[pos]||0)+1;
}
});
let html=`<div class="chapter-summary">
<h3>Capítulo ${cap} - ${CAPITULOS_OFICIAIS[cap]}</h3>
<div class="chapter-list">`;
Object.entries(grupo).sort().forEach(([p,q])=>{
html+=`<div class="chapter-item" onclick="document.getElementById('ncmInput').value='${p}';searchAndFilter();">${p} (${q})</div>`;
});
html+='</div></div>';
div.innerHTML=html;
}

function interpretar(txt){
if(txt.includes("export")) return "300";
if(txt.includes("difer")) return "400";
if(txt.includes("susp")) return "410";
if(txt.includes("monof")) return "200";
return null;
}

function searchAndFilter(){
let txt=document.getElementById("ncmInput").value.toLowerCase();
let cap=document.getElementById("filterCapitulo").value;
let cst=document.getElementById("filterCST").value;
let anexo=document.getElementById("filterAnexo").value;
let red=document.getElementById("filterReducao").value;
let autoCST=interpretar(txt);

currentResults=FLAT_INDEX.filter(i=>{
if(txt){
if(/^\d+$/.test(txt)){ if(!i.ncm.startsWith(txt)) return false;}
else{ if(!i.descricao.toLowerCase().includes(txt)) return false;}
}
if(cap && i.ncm.substring(0,2)!==cap) return false;
if((cst||autoCST) && i.cst!==(cst||autoCST)) return false;
if(anexo && i.anexo!==anexo) return false;
if(red==="com" && !i.regra.includes("reducao")) return false;
if(red==="sem" && i.regra.includes("reducao")) return false;
return true;
});
document.getElementById("totalResultados").textContent=currentResults.length;
currentPage=0;
renderTable();
}

function renderTable(){
let div=document.getElementById("resultado");
if(currentResults.length===0){div.innerHTML="Nenhum resultado";return;}
let start=currentPage*ITEMS_PER_PAGE;
let page=currentResults.slice(start,start+ITEMS_PER_PAGE);
div.innerHTML='<div class="table-container"><table><thead><tr><th>NCM</th><th>cClassTrib</th><th>CST</th><th>Descrição</th><th>Regra</th><th>Fundamento</th></tr></thead><tbody>'+
page.map(i=>`<tr>
<td>${i.ncm}</td>
<td class="cclasstrib-cell">${i.cclasstrib}</td>
<td>${i.cst}</td>
<td>${i.descricao}</td>
<td><span class="badge ${i.regra.includes("reducao")?"reducao":"outro"}">${i.regra}</span></td>
<td>${i.fundamento}</td>
</tr>`).join("")+
'</tbody></table></div>';
}

function clearAll(){
document.querySelectorAll("input,select").forEach(e=>e.value="");
currentResults=[...FLAT_INDEX];
document.getElementById("totalResultados").textContent=currentResults.length;
renderTable();
}

function exportCSV(){
if(currentResults.length===0)return;
let csv="NCM;cClassTrib;CST;Descrição;Regra;Fundamento\n";
currentResults.forEach(i=>{
csv+=`${i.ncm};${i.cclasstrib};${i.cst};${i.descricao};${i.regra};${i.fundamento}\n`;
});
let blob=new Blob(["\uFEFF"+csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="export.csv";
a.click();
}

function verificarTermo(){
if(localStorage.getItem("versaoAceita")!==SISTEMA_VERSAO){
document.getElementById("termoModal").style.display="flex";
}
}
function aceitarTermo(){
if(!document.getElementById("aceiteTermo").checked) return;
localStorage.setItem("versaoAceita",SISTEMA_VERSAO);
document.getElementById("termoModal").style.display="none";
}

document.addEventListener("DOMContentLoaded",()=>{loadData();verificarTermo();});
</script>

</body>
</html>
