        if (n.entries) n.entries.forEach(e => res.push({ncm: p, ...e}));

      collect(node, prefix);

        let li = document.createElement('li');
        li.innerHTML = `<button onclick="document.getElementById('ncm-input').value='\( {h}'; performSearch()"> \){h}</button>`;
        ul.appendChild(li);
      });
    }

    function addHist(ncm) {
      if (!history.includes(ncm)) history.unshift(ncm);
      history = history.slice(0,10);
      localStorage.setItem('hist', JSON.stringify(history));
      renderHist();
    }

    function showMessage(cls, txt) {
      let m = document.getElementById('message');
      m.className = cls;
      m.textContent = txt;
      setTimeout(() => { m.textContent = ''; m.className = ''; }, 5000);
    }

    function applyFilter() {
      let cstFilter = document.getElementById('filter-cst').value;
      let anexoFilter = document.getElementById('filter-anexo').value;

      let allResults = [];
      for (let ncm in data) {
        data[ncm].forEach(entry => {
          let matchCst = cstFilter === 'todos' || entry.cst === cstFilter;
          let matchAnexo = anexoFilter === 'todos' || entry.legislacao.includes(anexoFilter);
          if (matchCst && matchAnexo) {
            allResults.push({ncm, ...entry});
          }
        });
      }

      filteredResults = allResults;
      currentPage = 1;
      renderPg();
      updatePg();
      document.getElementById('results-table').style.display = filteredResults.length ? 'table' : 'none';
      document.getElementById('pagination').style.display = filteredResults.length ? 'flex' : 'none';
    }

    function performSearch() {
      let val = document.getElementById('ncm-input').value.trim().replace(/\D/g,'');
      if (val.length < 2 || val.length > 8) {
        showMessage('error', 'Digite 2 a 8 dígitos');
        return;
      }
      document.getElementById('loading').style.display = 'block';
      setTimeout(() => {
        currentResults = getByPrefix(val);
        if (currentResults.length === 0) {
          showMessage('error', 'Nenhum NCM encontrado');
          document.getElementById('results-table').style.display = 'none';
        } else {
          addHist(val);
          applyFilter(); // aplica filtros também na busca
        }
        document.getElementById('loading').style.display = 'none';
      }, 50);
    }

    function renderPg() {
      let body = document.getElementById('results-body');
      body.innerHTML = '';
      let ini = (currentPage-1)*20, fim = Math.min(ini+20, filteredResults.length);
      for (let i = ini; i < fim; i++) {
        let r = filteredResults[i];
        let tr = document.createElement('tr');
        tr.innerHTML = `<td>\( {r.ncm}</td><td> \){r.cclasstrib}</td><td>\( {r.cst}</td><td> \){r.descricao}</td><td>\( {r.pReducao}</td><td> \){r.legislacao}</td>`;
        body.appendChild(tr);
      }
    }

    function updatePg() {
      let tot = Math.ceil(filteredResults.length/20) || 1;
      document.getElementById('page-info').textContent = `Página ${currentPage} de ${tot}`;
      document.getElementById('prev-page').disabled = currentPage <= 1;
      document.getElementById('next-page').disabled = currentPage >= tot;
    }

    function exportar() {
      let csv = 'NCM;cClassTrib;CST;Descricao;pReducao;Legislacao\n';
      for (let n in data) data[n].forEach(e => csv += `\( {n}; \){e.cclasstrib};\( {e.cst};" \){e.descricao.replace(/"/g,'""')}";\( {e.pReducao}; \){e.legislacao}\n`);
      let blob = new Blob([csv], {type: 'text/csv'});
      let url = URL.createObjectURL(blob);
      let a = document.createElement('a');
      a.href = url; a.download = `cclasstrib-${new Date().toISOString().slice(0,10)}.csv`; a.click();
    }

    // Eventos
    document.getElementById('search-btn').onclick = performSearch;
    document.getElementById('ncm-input').onkeypress = e => { if (e.key === 'Enter') performSearch(); };
    document.getElementById('filter-cst').onchange = applyFilter;
    document.getElementById('filter-anexo').onchange = applyFilter;
    document.getElementById('export-csv').onclick = exportar;
    document.getElementById('svrs-btn').onclick = () => window.open('https://dfe-portal.svrs.rs.gov.br/DFE/TabelaClassificacaoTributaria', '_blank');
    document.getElementById('prev-page').onclick = () => { if (currentPage > 1) { currentPage--; renderPg(); updatePg(); } };
    document.getElementById('next-page').onclick = () => { let tot = Math.ceil(filteredResults.length/20); if (currentPage < tot) { currentPage++; renderPg(); updatePg(); } };

    // Inicialização
    init();
  </script>
</body>
</html>
