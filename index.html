<!DOCTYPE html>
<html lang="pt-BR">
<head> 
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cClassTrib por NCM - LC 214/2025</title>
<style>
:root{
  --primary:#1e3a8a;
  --success:#059669;
  --bg:#f8fafc;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',system-ui;
  background:var(--bg);
  padding:15px;
  color:#1e293b;
}

/* LAYOUT */
.container{
  background:white;
  max-width:1300px;
  margin:auto;
  border-radius:16px;
  box-shadow:0 4px 25px rgba(0,0,0,.06);
  overflow:hidden;
}

.header{
  background:linear-gradient(135deg,#1e3a8a,#3b82f6);
  color:white;
  padding:25px;
  text-align:center;
}

.content{
  padding:20px;
}

.stats{
  background:#f1f5f9;
  border-radius:12px;
  padding:12px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
  font-size:13px;
  border:1px solid #e2e8f0;
}

/* SEARCH BAR RESPONSIVO */
.search-bar{
  display:grid;
  gap:10px;
  grid-template-columns:1fr;
}
/* INPUTS E SELECTS */
input,
select{
  padding:12px;
  border:2px solid #e2e8f0;
  border-radius:12px;
  font-size:15px;
  background:white;
  transition:all .2s ease;
  outline:none;
}

input:focus,
select:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.15);
}
/* Tablet */
@media(min-width:600px){
  .search-bar{
    grid-template-columns:1fr 1fr;
  }
}

/* Desktop */
@media(min-width:992px){
  .search-bar{
    grid-template-columns:2fr 1fr 1fr 1fr 1fr;
  }
}

/* AÇÕES */
.actions{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:15px;
}

button{
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  color:white;
}

.btn-search{background:#2563eb;}
.btn-clear{background:#64748b;}
.btn-export{background:#059669;}
.btn-link{
  background:white;
  color:#475569;
  border:1px solid #e2e8f0;
}

/* TABELA */
.table-container{
  overflow-x:auto;
  border-radius:12px;
  border:1px solid #e2e8f0;
  margin-top:15px;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:800px;
}

th{
  background:#f8fafc;
  padding:12px;
  font-size:12px;
  text-transform:uppercase;
  border-bottom:2px solid #e2e8f0;
}

td{
  padding:12px;
  border-bottom:1px solid #f1f5f9;
  font-size:14px;
}

.cclasstrib-cell{
  color:var(--success);
  font-weight:bold;
  font-family:monospace;
}

/* FEEDBACK */
.loading{
  text-align:center;
  padding:40px;
  color:#64748b;
}

.error{
  background:#fef2f2;
  color:#b91c1c;
  padding:15px;
  border-radius:10px;
  text-align:center;
}

.pagination{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:15px;
  flex-wrap:wrap;
}

.page-btn{
  padding:6px 12px;
  border:1px solid #e2e8f0;
  border-radius:8px;
  background:white;
  cursor:pointer;
}

.page-btn.active{
  background:#2563eb;
  color:white;
}

mark{
  background:yellow;
  font-weight:bold;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(3px);
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.modal-content{
  background:white;
  padding:25px;
  width:90%;
  max-width:600px;
  border-radius:16px;
  transform:scale(0.9);
  opacity:0;
  transition:all .25s ease;
}

.modal.show{
  display:flex;
}

.modal.show .modal-content{
  transform:scale(1);
  opacity:1;
}

.close{
  float:right;
  cursor:pointer;
  font-size:20px;
}

/* CAPÍTULO WRAPPER */
.capitulo-wrapper{
  display:flex;
  gap:6px;
  align-items:center;
  width:100%;
}

.capitulo-wrapper select{
  flex:1;
  min-width:0;
}

.btn-capitulo{
  padding:12px;
  border-radius:12px;
  background:#1e3a8a;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .25s ease;
  white-space:nowrap;
}

.btn-capitulo:hover:not(:disabled){
  background:#2563eb;
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,.15);
}

.btn-capitulo:disabled{
  background:#cbd5e1;
  cursor:not-allowed;
  box-shadow:none;
}

/* Ajuste fino mobile */
@media(max-width:599px){
  .btn-capitulo{
    width:48px;
    padding:12px 0;
  }
}
  /* ===== MOBILE PORTRAIT AJUSTE FINO ===== */
@media (max-width: 480px) {

  body{
    padding:10px;
  }

  .header{
    padding:18px;
  }

  .header h1{
    font-size:22px;
  }

  .header p{
    font-size:13px;
  }

  .stats{
    font-size:12px;
    padding:10px;
  }

  .content{
    padding:15px;
  }

  input,
  select{
    font-size:14px;
    padding:10px;
  }

  button{
    padding:11px;
    font-size:14px;
  }

  .btn-capitulo{
    width:42px;
  }

  .actions{
    grid-template-columns:1fr;
  }

}
</style>
</head>

<body>
<div class="container">
<div class="header">
    <div id="versaoApp" style="
  font-size:12px;
  color:#64748b;
  margin-top:8px;
  text-align:center;
"></div>
<h1>🧾 cClassTrib por NCM</h1>
<p>Reforma Tributária 2026 | LC 214/2025</p>
</div>

<div class="content">

<div class="stats">
<span>Base: <strong id="totalNCMs">0</strong> NCMs</span>
<span>Regras: <strong id="totalItens">0</strong></span>
</div>

<div class="search-bar">
<input id="ncmInput" type="text" placeholder="🔍 Buscar NCM ou descrição">
<select id="filterCST">
<option value="">Todos CSTs</option>
<option value="000">000 - Integral</option>
<option value="200">200 - Reduzida</option>
<option value="410">410 - Imunidade</option>
</select>
<select id="filterAnexo">
<option value="">Todos Anexos</option>
<option value="ANEXO I">Anexo I</option>
<option value="ANEXO VII">Anexo VII</option>
<option value="ANEXO VIII">Anexo VIII</option>
<option value="ANEXO IX">Anexo IX</option>
<option value="ANEXO XV">Anexo XV</option>
</select>
<div class="capitulo-wrapper">
  <select id="filterCapitulo" onchange="toggleCapituloBtn()">
    <option value="">Todos Capítulos</option>
  </select>

  <button 
  type="button" 
  id="btnCapitulo"
  class="btn-capitulo"
  onclick="abrirModalCapitulo()"
  disabled
  title="Informações detalhadas do Capítulo"
  aria-label="Abrir informações do capítulo"
>
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
       xmlns="http://www.w3.org/2000/svg">
    <path d="M4 4h14a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V6a2 2 0 0 1 2-2z"
          stroke="white"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </svg>
</button>
</div>
<select id="filterReducao">
<option value="">Todos</option>
<option value="com">Apenas com redução</option>
<option value="sem">Sem redução</option>
</select>
</div>

<div class="actions">
<button class="btn-search" onclick="searchAndFilter()">🔍 Buscar</button>
<button class="btn-clear" onclick="clearAll()">🗑️ Limpar</button>
<button class="btn-export" onclick="exportCSV()">📤 Exportar CSV</button>
<button class="btn-link" onclick="window.open('https://dfe-portal.svrs.rs.gov.br/Cff/ClassificacaoTributaria','_blank')">🌐 SVRS Oficial</button>
</div>

<div id="resultado"></div>

</div>
</div>

<script>
// ===== VARIÁVEIS GLOBAIS =====
let RAW_DATA = {};
let FLAT_INDEX = [];
let currentResults = [];
let lastResultsCache = [];
let lastQueryKey = "";
let currentPage = 0;
const ITEMS_PER_PAGE = 20;

async function loadExternalData(){

  const div = document.getElementById('resultado');
  div.innerHTML = '<div class="loading">📥 Carregando dados...</div>';

  try{

    const response = await fetch('/cclasstrib-app/dados.json?v=' + Date.now());

    if(!response.ok){
      throw new Error("HTTP " + response.status);
    }

    RAW_DATA = await response.json();

    buildFlatIndex();
    populateCapituloFilter();
    updateCounters();

    div.innerHTML = '';

  }catch(error){

    console.error("ERRO REAL:", error);
    div.innerHTML = '<div class="error">Erro real: '+ error.message +'</div>';

  }
}
const CAPITULOS = {
  "01": "Animais vivos",
  "02": "Carnes e miudezas comestíveis",
  "03": "Peixes e crustáceos",
  "04": "Leite, laticínios e ovos",
  "05": "Outros produtos de origem animal",
  "06": "Plantas vivas e floricultura",
  "07": "Produtos hortícolas",
  "08": "Frutas",
  "09": "Café, chá e especiarias",
  "10": "Cereais",
  "11": "Produtos da indústria de moagem",
  "12": "Sementes e frutos oleaginosos",
  "13": "Gomas e resinas vegetais",
  "14": "Matérias para entrançar",
  "15": "Gorduras e óleos",
  "16": "Preparações de carne e peixe",
  "17": "Açúcares e confeitaria",
  "18": "Cacau e preparações",
  "19": "Preparações à base de cereais",
  "20": "Preparações de hortícolas",
  "21": "Preparações alimentícias diversas",
  "22": "Bebidas",
  "23": "Resíduos industriais alimentares",
  "24": "Tabaco",
  "25": "Sal, enxofre e minerais",
  "26": "Minérios",
  "27": "Combustíveis minerais",
  "28": "Produtos químicos inorgânicos",
  "29": "Produtos químicos orgânicos",
  "30": "Produtos farmacêuticos",
  "31": "Adubos",
  "32": "Corantes e extratos",
  "33": "Cosméticos e perfumes",
  "34": "Sabões e detergentes",
  "35": "Matérias albuminoides",
  "36": "Explosivos",
  "37": "Produtos fotográficos",
  "38": "Produtos químicos diversos",
  "39": "Plásticos",
  "40": "Borracha",
  "41": "Peles",
  "42": "Obras de couro",
  "43": "Peleteria",
  "44": "Madeira",
  "45": "Cortiça",
  "46": "Cestaria",
  "47": "Pastas de madeira",
  "48": "Papel",
  "49": "Livros e impressos",
  "50": "Seda",
  "51": "Lã",
  "52": "Algodão",
  "53": "Outras fibras vegetais",
  "54": "Filamentos sintéticos",
  "55": "Fibras sintéticas",
  "56": "Pastas e feltros",
  "57": "Tapetes",
  "58": "Tecidos especiais",
  "59": "Tecidos impregnados",
  "60": "Tecidos de malha",
  "61": "Vestuário de malha",
  "62": "Vestuário",
  "63": "Outros artefatos têxteis",
  "64": "Calçados",
  "65": "Chapéus",
  "66": "Guarda-chuvas",
  "67": "Penas e flores artificiais",
  "68": "Obras de pedra",
  "69": "Cerâmica",
  "70": "Vidro",
  "71": "Pedras preciosas",
  "72": "Ferro e aço",
  "73": "Obras de ferro",
  "74": "Cobre",
  "75": "Níquel",
  "76": "Alumínio",
  "77": "Reservado",
  "78": "Chumbo",
  "79": "Zinco",
  "80": "Estanho",
  "81": "Outros metais",
  "82": "Ferramentas",
  "83": "Obras diversas de metal",
  "84": "Máquinas mecânicas",
  "85": "Máquinas elétricas",
  "86": "Veículos ferroviários",
  "87": "Veículos automóveis",
  "88": "Aeronaves",
  "89": "Embarcações",
  "90": "Instrumentos ópticos e médicos",
  "91": "Relógios",
  "92": "Instrumentos musicais",
  "93": "Armas",
  "94": "Móveis",
  "95": "Brinquedos",
  "96": "Obras diversas",
  "97": "Obras de arte",
  "98": "Reservado",
  "99": "Uso especial"
};
function buildFlatIndex(){
FLAT_INDEX=[];
Object.entries(RAW_DATA).forEach(([ncm,items])=>{
items.forEach(item=>{
FLAT_INDEX.push({
ncm: ncm.replace(/\./g,''),
capitulo:ncm.substring(0,2),
cclasstrib:item.cclasstrib,
cst:item.cst,
descricao:item.descricao,
descricaoLower:item.descricao.toLowerCase(),
pReducao:parseFloat(item.pReducao)||0,
legislacao:item.legislacao,
legislacaoUpper:item.legislacao?item.legislacao.toUpperCase():""
});
});
});
}

function populateCapitulos(){
const select=document.getElementById("filterCapitulo");
const capitulos=[...new Set(FLAT_INDEX.map(i=>i.capitulo))].sort();
capitulos.forEach(cap=>{
const opt=document.createElement("option");
opt.value=cap;
opt.textContent=`Capítulo ${cap}`;
select.appendChild(opt);
});
}

function updateCounters(){
document.getElementById('totalNCMs').textContent=Object.keys(RAW_DATA).length;
document.getElementById('totalItens').textContent=FLAT_INDEX.length;
}

function setupDebounce(){
const input=document.getElementById("ncmInput");
let timeout;
input.addEventListener("input",()=>{
clearTimeout(timeout);
timeout=setTimeout(searchAndFilter,250);
});
}

function searchAndFilter(){
const rawQuery=document.getElementById('ncmInput').value.trim();
const fCST=document.getElementById('filterCST').value;
const fAnexo=document.getElementById('filterAnexo').value.toUpperCase();
const fCap=document.getElementById('filterCapitulo').value;
const fReducao=document.getElementById('filterReducao').value;

const queryKey=rawQuery+"|"+fCST+"|"+fAnexo+"|"+fCap+"|"+fReducao;
if(queryKey===lastQueryKey){currentResults=lastResultsCache;renderTable();return;}
lastQueryKey=queryKey;

const ncmQuery=rawQuery.replace(/\D/g,'');
const words=rawQuery.toLowerCase().split(/\s+/).filter(w=>w.length>1);
currentResults=[];

FLAT_INDEX.forEach(item=>{
let score=0;
if(ncmQuery){

// correspondência exata
if(item.ncm === ncmQuery){
score += 150;
}

// quando o JSON tem 4 dígitos e o usuário digitou 8
else if(ncmQuery.startsWith(item.ncm)){
score += 120;
}

// quando o JSON tem 8 e usuário digitou 4
else if(item.ncm.startsWith(ncmQuery)){
score += 80;
}

// correspondência parcial
else if(item.ncm.includes(ncmQuery)){
score += 40;
}
else{
return;
}
}
words.forEach(word=>{if(item.descricaoLower.includes(word)) score+=15;});
if(!ncmQuery && words.length>0 && score===0) return;
if(fCST && item.cst!==fCST) return;
if(fAnexo && !item.legislacaoUpper.includes(fAnexo)) return;
if(fCap && item.capitulo!==fCap) return;
if(fReducao==="com" && item.pReducao<=0) return;
if(fReducao==="sem" && item.pReducao>0) return;
currentResults.push({...item,score});
});

currentResults.sort((a,b)=>b.score-a.score);
lastResultsCache=currentResults;
currentPage=0;
renderTable(words);
}

function highlight(text,words){
if(!words||words.length===0) return text;
let result=text;
words.forEach(word=>{
const regex=new RegExp(`(${word})`,"gi");
result=result.replace(regex,"<mark>$1</mark>");
});
return result;
}

function renderTable(words=[]){
const div=document.getElementById("resultado");
if(currentResults.length===0){div.innerHTML='<div class="error">Nenhum resultado encontrado</div>';return;}
const start=currentPage*ITEMS_PER_PAGE;
const end=start+ITEMS_PER_PAGE;
const pageItems=currentResults.slice(start,end);

div.innerHTML=`
<div class="table-container">
<table>
<thead>
<tr>
<th>NCM</th><th>cClassTrib</th><th>CST</th>
<th>Descrição</th><th>Redução %</th><th>Legislação</th>
</tr>
</thead>
<tbody>
${pageItems.map(item=>`
<tr>
<td>${item.ncm}</td>
<td class="cclasstrib-cell">${item.cclasstrib}</td>
<td>${item.cst}</td>
<td>${highlight(item.descricao,words)}</td>
<td>${item.pReducao}%</td>
<td>${item.legislacao}</td>
</tr>`).join("")}
</tbody>
</table>
</div>
${renderPagination()}
`;
}

function renderPagination(){
const totalPages=Math.ceil(currentResults.length/ITEMS_PER_PAGE);
if(totalPages<=1) return "";
let buttons="";
for(let i=0;i<totalPages;i++){
buttons+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="changePage(${i})">${i+1}</button>`;
}
return `<div class="pagination">${buttons}</div>`;
}

function changePage(page){currentPage=page;renderTable();}

function clearAll(){
document.getElementById('ncmInput').value="";
document.getElementById('filterCST').value="";
document.getElementById('filterAnexo').value="";
document.getElementById('filterCapitulo').value="";
document.getElementById('filterReducao').value="";
document.getElementById('resultado').innerHTML="";
currentResults=[];lastResultsCache=[];lastQueryKey="";currentPage=0;
}

function exportCSV(){
if(currentResults.length===0){alert("Nenhum resultado.");return;}
const headers=["NCM","cClassTrib","CST","Descrição","Redução","Legislação"];
const rows=currentResults.map(i=>[
i.ncm,i.cclasstrib,i.cst,
`"${i.descricao.replace(/"/g,'""')}"`,
i.pReducao,
`"${i.legislacao.replace(/"/g,'""')}"`
]);
const csv=[headers,...rows].map(e=>e.join(";")).join("\n");
const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
const url=URL.createObjectURL(blob);
const link=document.createElement("a");
link.href=url;
link.download="cclasstrib_export.csv";
link.click();
URL.revokeObjectURL(url);
}
function populateCapituloFilter() {
  const select = document.getElementById("filterCapitulo");
  select.innerHTML = '<option value="">Todos Capítulos</option>';

  Object.keys(CAPITULOS).forEach(cap => {
    const option = document.createElement("option");
    option.value = cap;
    option.textContent = `${cap} - ${CAPITULOS[cap]}`;
    select.appendChild(option);
  });
}
  function abrirModalCapitulo() {
  const cap = document.getElementById("filterCapitulo").value;
  if (!cap) return;

  const registros = FLAT_INDEX.filter(i => i.capitulo === cap);
  const posicoes = [...new Set(registros.map(i => i.ncm.substring(0,4)))];

  document.getElementById("conteudoCapitulo").innerHTML = `
    <h2>Capítulo ${cap}</h2>
    <p><strong>${CAPITULOS[cap]}</strong></p>
    <p>Total de NCM no sistema: ${registros.length}</p>
    <p><strong>Posições encontradas:</strong><br>${posicoes.join(", ")}</p>
  `;

  document.getElementById("modalCapitulo").classList.add("show");
}

function fecharModal() {
  document.getElementById("modalCapitulo").classList.remove("show");
}
  function toggleCapituloBtn() {
  const select = document.getElementById("filterCapitulo");
  const btn = document.getElementById("btnCapitulo");
  btn.disabled = !select.value;
  }
  document.addEventListener("DOMContentLoaded", () => {
  loadExternalData();
  setupDebounce();
});
</script>
  <div id="modalCapitulo" class="modal">
  <div class="modal-content">
    <span class="close" onclick="fecharModal()">&times;</span>
    <div id="conteudoCapitulo"></div>
  </div>
  </div>
</body>
</html>
