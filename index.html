<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>cClassTrib por NCM - LC 214/2025</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --bg: #f1f5f9;
        }

        * {margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            padding: 10px; 
            color: #1e293b;
        }

        .container {
            background: white; 
            max-width: 1200px; 
            margin: 0 auto; 
            border-radius: 16px; 
            box-shadow: 0 4px 25px rgba(0,0,0,0.1); 
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); 
            color: white; 
            padding: 30px 15px; 
            text-align: center;
        }

        .header h1 { font-size: clamp(1.5rem, 5vw, 2rem); margin-bottom: 8px; }
        .header p { font-size: 0.9rem; opacity: 0.9; }

        .content { padding: 15px; }

        /* Stats Responsivo */
        .stats {
            background: #f8fafc; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 13px;
        }

        /* Grid de Busca: 1 coluna no telemóvel, 3 no PC */
        .search-bar {
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 12px; 
            margin-bottom: 15px;
        }
        @media (min-width: 768px) {
            .search-bar { grid-template-columns: 2fr 1fr 1fr; }
        }

        input, select {
            width: 100%;
            padding: 14px; 
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 16px; /* Evita zoom automático no iOS */
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); outline: none; }

        /* Botões Responsivos */
        .actions-grid {
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 10px; 
            margin-bottom: 10px;
        }
        @media (min-width: 480px) {
            .actions-grid { grid-template-columns: 1fr 1fr; }
        }

        button {
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.2s; 
            color: white;
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        
        button:active { transform: scale(0.98); }

        .btn-search { background: var(--primary); }
        .btn-clear { background: #64748b; }
        .btn-export { background: var(--success); }
        .btn-link { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        /* Tabela Adaptável */
        .table-container {
            width: 100%;
            overflow-x: auto; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0;
            margin-top: 15px;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; padding: 15px 10px; text-align: left; font-size: 13px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 15px 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        
        .cclasstrib-cell { color: var(--success); font-weight: bold; font-family: monospace; font-size: 16px; }

        /* Paginação */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn { padding: 10px 16px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .loading { text-align: center; padding: 40px; color: #64748b; }
        .error { background: #fef2f2; color: #b91c1c; padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🧾 cClassTrib por NCM</h1>
        <p>Reforma Tributária 2026 | LC 214/2025</p>
    </div>

    <div class="content">
        <div class="stats">
            <span>Base: <strong id="totalNCMs">0</strong> NCMs</span>
            <span>Regras: <strong id="totalItens">0</strong></span>
        </div>

        <div class="search-bar">
            <input id="ncmInput" type="tel" placeholder="🔍 Digite NCM (ex: 02013000)" maxlength="8">
            <select id="filterCST">
                <option value="">Todos CSTs</option>
                <option value="000">000 - Integral</option>
                <option value="200">200 - Reduzida</option>
                <option value="410">410 - Imunidade</option>
            </select>
            <select id="filterAnexo">
                <option value="">Todos Anexos</option>
                <option value="Anexo I">Anexo I - Cesta Básica</option>
                <option value="Anexo VIII">Anexo VIII - Higiene</option>
                <option value="Anexo IX">Anexo IX - Agro</option>
                <option value="Anexo XV">Anexo XV - Hortifrúti</option>
            </select>
        </div>

        <div class="actions-grid">
            <button onclick="searchAndFilter()" class="btn-search">🔍 Buscar / Filtrar</button>
            <button onclick="clearAll()" class="btn-clear">🗑️ Limpar</button>
        </div>

        <div class="actions-grid">
            <button onclick="exportCSV()" class="btn-export">📤 Exportar CSV</button>
            <button onclick="window.open('https://dfe-portal.svrs.rs.gov.br/Cff/ClassificacaoTributaria', '_blank')" class="btn-link">🌐 Tabela SVRS</button>
        </div>

        <div id="resultado"></div>
    </div>
</div>

<script>
    let NCM_DATA = {};
    let NCM_TREE = {};
    let currentResults = [];
    let currentPage = 0;
    const ITEMS_PER_PAGE = 15;

    async function loadExternalData() {
        const resultDiv = document.getElementById('resultado');
        resultDiv.innerHTML = '<div class="loading">📥 Sincronizando dados...</div>';
        
        const GITHUB_URL = 'https://raw.githubusercontent.com/franklind22/cclasstrib/main/dados.json';

        try {
            const response = await fetch(`${GITHUB_URL}?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error();
            NCM_DATA = await response.json();
            
            Object.keys(NCM_DATA).forEach(ncm => {
                const prefix = ncm.slice(0,4);
                if (!NCM_TREE[prefix]) NCM_TREE[prefix] = [];
                NCM_TREE[prefix].push(ncm);
            });

            document.getElementById('totalNCMs').textContent = Object.keys(NCM_DATA).length;
            document.getElementById('totalItens').textContent = Object.values(NCM_DATA).reduce((a,b) => a + b.length, 0);
            resultDiv.innerHTML = '';
        } catch (e) {
            resultDiv.innerHTML = '<div class="error">❌ Erro ao conectar ao GitHub.</div>';
        }
    }

    function searchAndFilter() {
        const ncmQuery = document.getElementById('ncmInput').value.replace(/\D/g,'');
        const fCST = document.getElementById('filterCST').value;
        const fAnexo = document.getElementById('filterAnexo').value;
        let pool = [];

        if (ncmQuery.length >= 2) {
            const prefix = ncmQuery.slice(0,4);
            const matches = (NCM_TREE[prefix] || []).filter(code => code.includes(ncmQuery));
            matches.forEach(code => {
                NCM_DATA[code].forEach(item => pool.push({...item, ncm: code}));
            });
        } else {
            Object.entries(NCM_DATA).forEach(([code, items]) => {
                items.forEach(item => pool.push({...item, ncm: code}));
            });
        }

        currentResults = pool.filter(item => {
            const matchCST = !fCST || item.cst === fCST;
            const matchAnexo = !fAnexo || (item.legislacao && item.legislacao.toUpperCase().includes(fAnexo.toUpperCase()));
            return matchCST && matchAnexo;
        });

        currentPage = 0;
        renderTable();
    }

    function renderTable() {
        const container = document.getElementById('resultado');
        if (currentResults.length === 0) {
            container.innerHTML = '<div class="error">Nenhum dado encontrado.</div>';
            return;
        }

        const start = currentPage * ITEMS_PER_PAGE;
        const pageData = currentResults.slice(start, start + ITEMS_PER_PAGE);

        let html = `<div class="table-container"><table>
            <thead><tr><th>NCM</th><th>cClassTrib</th><th>CST</th><th>Descrição</th><th>Red.</th><th>Legislação</th></tr></thead>
            <tbody>`;

        pageData.forEach(item => {
            html += `<tr>
                <td><strong>${item.ncm}</strong></td>
                <td class="cclasstrib-cell">${item.cclasstrib}</td>
                <td><span style="background:#f1f5f9; padding:4px 8px; border-radius:4px;">${item.cst}</span></td>
                <td>${item.descricao}</td>
                <td>${item.pReducao || '0%'}</td>
                <td style="font-size:11px; color:#94a3b8;">${item.legislacao}</td>
            </tr>`;
        });

        html += '</tbody></table></div>';
        
        if (currentResults.length > ITEMS_PER_PAGE) {
            html += '<div class="pagination">';
            if (currentPage > 0) html += `<button class="page-btn" onclick="changePage(-1)">«</button>`;
            html += `<button class="page-btn active">${currentPage + 1}</button>`;
            if (start + ITEMS_PER_PAGE < currentResults.length) html += `<button class="page-btn" onclick="changePage(1)">»</button>`;
            html += '</div>';
        }

        container.innerHTML = html;
    }

    function changePage(step) { currentPage += step; renderTable(); }

    function clearAll() {
        document.getElementById('ncmInput').value = '';
        document.getElementById('filterCST').value = '';
        document.getElementById('filterAnexo').value = '';
        document.getElementById('resultado').innerHTML = '';
        currentResults = [];
    }

    function exportCSV() {
        const data = currentResults.length ? currentResults : 
            Object.entries(NCM_DATA).flatMap(([ncm, items]) => items.map(i => ({...i, ncm})));
        let csv = '\ufeffNCM;cClassTrib;CST;Descricao;Reducao;Legislacao\n';
        data.forEach(i => {
            csv += `"${i.ncm}";"${i.cclasstrib}";"${i.cst}";"${i.descricao.replace(/"/g,'""')}";"${i.pReducao}";"${i.legislacao}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `auditoria_ncm_2026.csv`;
        link.click();
    }

    document.addEventListener('DOMContentLoaded', loadExternalData);
</script>
</body>
</html>
